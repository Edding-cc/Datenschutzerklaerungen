<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datenschutzerklärungen – Nathan Geiger</title>
  <style>
    :root {
      --bg: #fafaf8;
      --ink: #111111;
      --muted: #888880;
      --line: #e0e0d8;
      --accent: #111111;
      --hover-bg: #f0f0ec;
      --font: 'Georgia', 'Times New Roman', serif;
      --font-ui: 'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      min-height: 100vh;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .masthead {
      border-bottom: 2px solid var(--ink);
      padding-bottom: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .masthead-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--font-ui);
      margin-bottom: 0.6rem;
    }

    .masthead h1 {
      font-family: var(--font);
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--ink);
    }

    .masthead h1 span {
      font-style: italic;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0 1.8rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-ui);
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--line);
      margin-bottom: 2rem;
    }

    #count-label { font-variant-numeric: tabular-nums; }

    #file-list {
      list-style: none;
    }

    .file-item {
      border-bottom: 1px solid var(--line);
    }

    .file-item:first-child {
      border-top: 1px solid var(--line);
    }

    .file-item a {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.95rem 0.25rem;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.1s;
    }

    .file-item a:hover {
      background: var(--hover-bg);
      padding-left: 0.75rem;
      padding-right: 0.75rem;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
    }

    .doc-number {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--font-ui);
      min-width: 1.5rem;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .doc-name {
      flex: 1;
      font-family: var(--font);
      font-size: 1rem;
      font-style: italic;
      color: var(--ink);
    }

    .doc-arrow {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .file-item a:hover .doc-arrow {
      transform: translateX(3px);
    }

    .skeleton-item {
      border-bottom: 1px solid var(--line);
      padding: 0.95rem 0.25rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .skeleton-bar {
      height: 14px;
      background: linear-gradient(90deg, #e8e8e4 25%, #f2f2ee 50%, #e8e8e4 75%);
      background-size: 300% 100%;
      animation: sh 1.4s infinite;
      border-radius: 2px;
    }

    @keyframes sh {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .status-msg {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--font-ui);
      text-align: center;
      padding: 3rem 0;
    }

    .status-msg.error {
      color: #a03030;
    }

    .footer {
      margin-top: 3.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--font-ui);
      letter-spacing: 0.04em;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    @media (max-width: 480px) {
      .page { padding: 2.5rem 1.25rem 4rem; }
      .masthead h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <p class="masthead-label">Datenschutzerklärungen</p>
    <h1>Nathan Geiger</h1>
  </header>

  <div class="meta-row">
    <span id="count-label">Lade …</span>
    <span id="updated-label"></span>
  </div>

  <ul id="file-list" aria-live="polite"></ul>

  <footer class="footer">
    <span>Edwing · GitHub Pages</span>
    <span>edding-cc / Datenschutzerklaerungen</span>
  </footer>

</div>

<script>
  const OWNER = 'edding-cc';
  const REPO  = 'Datenschutzerklaerungen';
  const PATH  = '';
  const THIS  = 'index.html';
  const BASE  = `https://${OWNER}.github.io/${REPO}/`;

  const listEl    = document.getElementById('file-list');
  const countEl   = document.getElementById('count-label');
  const updatedEl = document.getElementById('updated-label');

  function skeletons(n) {
    listEl.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const li = document.createElement('li');
      li.className = 'skeleton-item';
      li.innerHTML = `<div class="skeleton-bar" style="width:2rem"></div><div class="skeleton-bar" style="flex:1;max-width:${180 + Math.random()*160|0}px"></div>`;
      listEl.appendChild(li);
    }
  }

  function stripExt(name) {
    return name.replace(/\.html?$/i, '');
  }

  async function load() {
    skeletons(5);
    try {
      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );

      if (!res.ok) {
        const rem = res.headers.get('X-RateLimit-Remaining');
        if (res.status === 403 && rem === '0')
          throw new Error('GitHub API Rate-Limit erreicht (60/h) – bitte später versuchen.');
        if (res.status === 404)
          throw new Error('Repository nicht gefunden oder privat.');
        throw new Error(`GitHub API: ${res.status}`);
      }

      const files = await res.json();
      const htmls = files
        .filter(f => f.type === 'file' && /\.html?$/i.test(f.name) && f.name.toLowerCase() !== THIS)
        .sort((a, b) => a.name.localeCompare(b.name, 'de'));

      listEl.innerHTML = '';

      if (!htmls.length) {
        listEl.innerHTML = `<li><p class="status-msg">Keine weiteren HTML-Dokumente gefunden.</p></li>`;
        countEl.textContent = '0 Dokumente';
        return;
      }

      htmls.forEach((file, i) => {
        const li = document.createElement('li');
        li.className = 'file-item';
        const url = BASE + file.name;
        const label = stripExt(file.name);
        li.innerHTML = `
          <a href="${url}">
            <span class="doc-number">${String(i + 1).padStart(2, '0')}</span>
            <span class="doc-name">${label}</span>
            <span class="doc-arrow">→</span>
          </a>`;
        listEl.appendChild(li);
      });

      countEl.textContent = `${htmls.length} Dokument${htmls.length !== 1 ? 'e' : ''}`;
      updatedEl.textContent = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

    } catch (err) {
      listEl.innerHTML = `<li><p class="status-msg error">${err.message}</p></li>`;
      countEl.textContent = 'Fehler beim Laden';
    }
  }

  load();
</script>
</body>
</html>
